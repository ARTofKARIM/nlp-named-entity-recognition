data:
  format: "conll"
  train_path: "data/train.txt"
  test_path: "data/test.txt"
  labels: ["O", "B-PER", "I-PER", "B-ORG", "I-ORG", "B-LOC", "I-LOC", "B-MISC", "I-MISC"]
model:
  type: "bilstm_crf"
  embedding_dim: 100
  hidden_dim: 256
  dropout: 0.3
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
